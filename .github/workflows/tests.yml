name: Tests

# WORKFLOW LOGIC EXPLANATION:
# Runs Vitest unit tests with V8 coverage and uploads results to Codecov.
# This workflow tracks coverage on the dev branch continuously.
# PR and release coverage is handled by ci.yml (test → build → release pipeline).
#
# Execution rules by trigger:
# - PUSH on dev:     Runs when src/** files change (continuous coverage tracking).
# - MANUAL:          Always runs (useful to force a coverage report).
#
# Artifacts uploaded on every run:
# - coverage/        Full V8 coverage report (HTML + lcov + JSON)
# - junit.xml        JUnit test results
#
# Codecov integration:
# - Coverage report (lcov.info) → Codecov coverage
# - junit.xml        → Codecov test results

on:
  push:
    branches:
      - dev
    paths:
      - 'src/**'
  workflow_dispatch:

# Cancel in-progress runs for the same branch/event to avoid wasting resources.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  vitest:
    name: Run Vitest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: |
          npx vitest run \
            --coverage \
            --reporter=verbose \
            --reporter=junit \
            --outputFile.junit=junit.xml

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-iopool-card
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./junit.xml
          flags: unittests
          report_type: test_results
          fail_ci_if_error: false

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            junit.xml
          retention-days: 7

  tests-summary:
    name: Tests Summary
    if: always()
    needs: [vitest]
    runs-on: ubuntu-latest

    steps:
      - name: Check test results
        run: |
          echo "📊 Test Results Summary"
          echo "Trigger: ${{ github.event_name }}"
          echo ""
          echo "┌──────────────────────────────────────────────────────────────────────┐"
          echo "│ Trigger: ${{ github.event_name }}"
          echo "│ Branch:  ${{ github.ref_name }}"
          echo "└──────────────────────────────────────────────────────────────────────┘"
          echo ""

          if [[ "${{ needs.vitest.result }}" == "success" ]]; then
            echo "✅ All tests passed!"
            exit 0
          else
            echo "❌ Tests failed. Please review the logs above."
            exit 1
          fi
